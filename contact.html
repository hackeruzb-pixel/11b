<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact PRO</title>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:#0a0a0a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:100%;
  max-width:450px;
  padding:25px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  box-shadow:0 0 25px rgba(0,255,255,0.2);
  backdrop-filter:blur(10px);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
  font-size:14px;
}

textarea{
  resize:none;
  height:120px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#00ffff;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#00cccc;
}

.status{
  margin-top:10px;
  text-align:center;
  font-size:14px;
}
</style>

</head>
<body>

<div class="container">
  <h2>📩 Contact Me</h2>

  <form id="contactForm">
    <input type="text" id="name" placeholder="Ismingiz" required>
    <input type="email" id="email" placeholder="Emailingiz" required>
    <textarea id="message" placeholder="Xabar yozing..." required></textarea>
    <button type="submit">Yuborish</button>
  </form>

  <div class="status" id="status"></div>
</div>

<script>
// 🔥 EMAILJS INIT
(function(){
  emailjs.init("BjfR-xWClrji7-avv");
})();

const form = document.getElementById("contactForm");
const statusText = document.getElementById("status");

form.addEventListener("submit", function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  statusText.innerHTML = "⏳ Yuborilmoqda...";

  // 1️⃣ EMAILJS
  emailjs.send("service_330emza", "template_ud4xsy6", {
    name: name,
    email: email,
    message: message
  })
  .then(function(){
    console.log("Email yuborildi");
  }, function(error){
    console.log("Email error:", error);
  });

  // 2️⃣ TELEGRAM
  const botToken = "YOUR_BOT_TOKEN";
  const chatId = "YOUR_CHAT_ID";

  const text = `📩 Yangi xabar!\n\n👤 Ism: ${name}\n📧 Email: ${email}\n💬 Xabar: ${message}`;

  fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      chat_id: chatId,
      text: text
    })
  })
  .then(res => res.json())
  .then(data => console.log("Telegram yuborildi", data))
  .catch(err => console.log("Telegram error", err));

  // ✅ UI
  statusText.innerHTML = "✅ Xabar yuborildi!";
  form.reset();
});
</script>

</body>
</html>
