<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Access</title>
<link rel="stylesheet" href="./css/admin.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginBox" class="loginBox">

  <div class="card">

    <div class="logo">🔐 Admin System</div>
    <p class="subtitle">Secure dashboard access</p>

    <input type="password" id="adminPass" placeholder="Enter admin password">

    <button onclick="checkPass()">Login</button>

    <div class="hint">Protected system • Authorized users only</div>

  </div>

</div>

<!-- PANEL -->
<div id="adminPanel" class="hidden">

  <div class="topBar">
    <button onclick="goBack()">⬅ Back</button>
    <h2>Admin Dashboard</h2>
  </div>

  <div class="stats">
    👥 Total Users: <span id="totalUsers">0</span>
  </div>

  <button class="danger" onclick="clearChat()">🗑 Clear Chat</button>

  <div id="userList" class="userList"></div>

</div>

<script type="module" src="./js/admin.js"></script>
</body>
</html>
