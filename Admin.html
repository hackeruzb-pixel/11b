<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Admin Access</title>
<link rel="stylesheet" href="./css/admin.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginBox" class="loginBox">

  <div class="fingerCard">

    <h2>🔐 Secure Access</h2>
    <p>Place fingerprint to continue</p>

    <!-- FINGERPRINT ICON -->
    <div class="fingerprint" onclick="scanFingerprint()">
      <div class="scanLine"></div>
    </div>

    <button onclick="scanFingerprint()">Scan Fingerprint</button>

    <input type="password" id="adminPass" placeholder="or enter key manually">

    <button onclick="checkPass()">Login</button>

    <div class="hint">SYSTEM: HIGH SECURITY MODE</div>

  </div>

</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">
  <h2>Admin Panel</h2>
  <button onclick="goBack()">⬅ Back</button>
</div>

<script type="module" src="./js/admin.js"></script>
</body>
</html>
