<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<link rel="stylesheet" href="./css/admin.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginBox" class="loginBox">
  <h2>🔐 Admin Login</h2>
  <input type="password" id="adminPass" placeholder="Enter password">
  <button onclick="checkPass()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="adminPanel hidden">

  <div class="topBar">
    <button onclick="goBack()">⬅ Orqaga</button>
    <h2>👑 Admin Panel</h2>
  </div>

  <div class="stats">
    👥 Users: <span id="totalUsers">0</span>
  </div>

  <button class="danger" onclick="clearChat()">🗑 Clear Chat</button>

  <h3>Users</h3>
  <div id="userList"></div>

</div>

<script type="module" src="./js/admin.js"></script>
</body>
</html>
