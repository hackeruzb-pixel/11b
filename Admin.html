<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="./css/admin.css">
</head>
<body>

<div class="bg"></div>

<!-- LOGIN -->
<div id="loginBox" class="loginBox">
  <div class="card">
    <h2>🔐 Admin Login</h2>
    <p>Secure access panel</p>

    <input type="password" id="adminPass" placeholder="Enter password">
    <button onclick="checkPass()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="adminPanel" class="hidden dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>⚡ Admin</h2>

    <button onclick="showTab('users')">👥 Users</button>
    <button onclick="showTab('chat')">💬 Chat</button>
    <button onclick="clearChat()">🗑 Clear Chat</button>
    <button onclick="goBack()">⬅ Exit</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h3 id="title">Admin Dashboard</h3>
      <span id="stats">Loading...</span>
    </div>

    <!-- USERS -->
    <div id="usersTab" class="tab">
      <div id="userList"></div>
    </div>

    <!-- CHAT -->
    <div id="chatTab" class="tab hidden">
      <h3>Chat Control</h3>
      <p>Manage messages here</p>
    </div>

  </div>

</div>

<script type="module" src="./js/admin.js"></script>
</body>
</html>
